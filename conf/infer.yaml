defaults:
  - paths          
  - _self_        

input: ""                       # required 
ckpt: ${model_satlas}           # default: satlas SwinB checkpoint (from paths.yaml)
out: ${out_infer}               # default: results/
task: all                       # all | shape | centerline | width
thresh: 0.4           
size: 512                
sword: null                   
backbone: null                 
head: null                      
adaptor: linear
method: vanilla

hydra:
  run:
    dir: .
  output_subdir: null
  job_logging:
    root:
      handlers: []
